version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: pintuotuo_postgres
    environment:
      POSTGRES_USER: pintuotuo
      POSTGRES_PASSWORD: dev_password_123
      POSTGRES_DB: pintuotuo_db
      POSTGRES_INITDB_ARGS: "-E UTF8"
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/db/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pintuotuo"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - pintuotuo_network
    command: postgres -c max_connections=200

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: pintuotuo_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - pintuotuo_network
    command: redis-server --appendonly yes

  # Kafka Broker (for async messaging)
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: pintuotuo_kafka
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://127.0.0.1:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: 'true'
    ports:
      - "9092:9092"
      - "29092:29092"
    depends_on:
      - zookeeper
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:9092"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - pintuotuo_network

  # Zookeeper (required by Kafka)
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: pintuotuo_zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    volumes:
      - zookeeper_data:/var/lib/zookeeper/data
    networks:
      - pintuotuo_network

  # Elasticsearch (for logging/analytics - optional, can be added later)
  # elasticsearch:
  #   image: docker.elastic.co/elasticsearch/elasticsearch:8.5.0
  #   container_name: pintuotuo_elasticsearch
  #   environment:
  #     - discovery.type=single-node
  #     - xpack.security.enabled=false
  #   ports:
  #     - "9200:9200"
  #   volumes:
  #     - elasticsearch_data:/usr/share/elasticsearch/data
  #   networks:
  #     - pintuotuo_network

  # Mock API Server (JSON Server for frontend development)
  mock_api:
    image: node:18-alpine
    container_name: pintuotuo_mock_api
    working_dir: /app
    volumes:
      - ./services/mock-api:/app
    ports:
      - "3001:3001"
    environment:
      PORT: 3001
    command: sh -c "npm install && npm start"
    depends_on:
      - postgres
    networks:
      - pintuotuo_network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3001/api/products"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  zookeeper_data:
    driver: local
  # elasticsearch_data:
  #   driver: local

networks:
  pintuotuo_network:
    driver: bridge
