version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: pintuotuo_postgres_test
    environment:
      POSTGRES_USER: pintuotuo
      POSTGRES_PASSWORD: dev_password_123
      POSTGRES_DB: pintuotuo_db
    ports:
      - "5433:5432"
    volumes:
      - ./scripts/db/full_schema.sql:/docker-entrypoint-initdb.d/01-full_schema.sql
    command: postgres -c max_connections=200
    network_mode: "bridge"

  redis:
    image: redis:7-alpine
    container_name: pintuotuo_redis_test
    ports:
      - "6380:6379"
    command: redis-server --appendonly yes
    network_mode: "bridge"
