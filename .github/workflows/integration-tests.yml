name: Integration Tests

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  actions: read

env:
  GO_VERSION: '1.21'
  NODE_VERSION: '18'

jobs:
  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: pintuotuo
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: pintuotuo_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Install dependencies
        working-directory: ./backend
        run: go mod download

      - name: Run database migrations
        working-directory: ./backend
        env:
          DATABASE_URL: postgres://pintuotuo:test_password@localhost:5432/pintuotuo_test?sslmode=disable
        run: |
          for f in migrations/*.sql; do
            echo "Running migration: $f"
            psql "$DATABASE_URL" -f "$f" || echo "Migration $f completed with warnings"
          done

      - name: Seed test data
        working-directory: ./backend
        env:
          DATABASE_URL: postgres://pintuotuo:test_password@localhost:5432/pintuotuo_test?sslmode=disable
        run: |
          echo "Seeding test data..."
          psql "$DATABASE_URL" -f ../scripts/db/seed_test_data.sql || echo "Seed completed with warnings"

      - name: LiteLLM catalog sync (soft verify)
        working-directory: ./backend
        env:
          DATABASE_URL: postgres://pintuotuo:test_password@localhost:5432/pintuotuo_test?sslmode=disable
        run: |
          go run ./cmd/litellm-catalog-sync -verify -soft \
            -config ../deploy/litellm/litellm_proxy_config.yaml

      - name: Run integration tests
        working-directory: ./backend
        env:
          DATABASE_URL: postgres://pintuotuo:test_password@localhost:5432/pintuotuo_test?sslmode=disable
          REDIS_URL: localhost:6379
          GIN_MODE: test
        run: |
          go test -v -run Integration -race -coverprofile=integration-coverage.out -covermode=atomic ./...

      - name: Upload integration coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ./backend/integration-coverage.out
          flags: backend-integration
          name: backend-integration-coverage
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Generate test report
        if: always()
        run: |
          echo "## Integration Tests Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Integration tests completed." >> $GITHUB_STEP_SUMMARY

  notify:
    name: Notify Status
    runs-on: ubuntu-latest
    needs: [integration-tests]
    if: always()

    steps:
      - name: Check job status
        run: |
          echo "## Integration Tests Pipeline Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Integration Tests | ${{ needs.integration-tests.result }} |" >> $GITHUB_STEP_SUMMARY
