name: Integration Tests - Payment Service

on:
  push:
    branches: [main, develop]
    paths:
      - 'backend/**'
      - '.github/workflows/integration-tests.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'backend/**'

jobs:
  integration-tests:
    name: Run Integration Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: pintuotuo
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: pintuotuo_test
          POSTGRES_INITDB_ARGS: "-E UTF8"
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
        volumes:
          - ./scripts/db/full_schema.sql:/docker-entrypoint-initdb.d/init.sql

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up Go
      uses: actions/setup-go@v4
      with:
        go-version: '1.21'
        cache: true
        cache-dependency-path: 'backend/go.sum'

    - name: Display Go version
      run: go version

    - name: Download Go dependencies
      run: |
        go mod download
        go mod verify
      working-directory: ./backend

    - name: Initialize Database
      run: |
        # Wait for PostgreSQL to be ready
        until pg_isready -h localhost -p 5432 -U pintuotuo; do
          echo 'Waiting for PostgreSQL...'
          sleep 1
        done

        # Run initialization script
        PGPASSWORD=test_password psql \
          -h localhost \
          -U pintuotuo \
          -d pintuotuo_test \
          -f ../scripts/db/full_schema.sql || true
      working-directory: ./backend

    - name: Run Integration Tests
      run: |
        go test -v ./tests/integration \
          -timeout 120s \
          -coverprofile=coverage.out
      working-directory: ./backend

    - name: Generate Coverage Report
      run: |
        coverage=$(go tool cover -func=coverage.out | grep total | awk '{print $3}')
        echo "### Test Coverage: ${coverage}" >> $GITHUB_STEP_SUMMARY
        go tool cover -func=coverage.out >> $GITHUB_STEP_SUMMARY
      working-directory: ./backend

    - name: Check Coverage Threshold
      run: |
        coverage=$(go tool cover -func=coverage.out | grep total | awk '{print $3}' | sed 's/%//')
        echo "Coverage: ${coverage}%"
        threshold=80
        if (( $(echo "$coverage < $threshold" | bc -l) )); then
          echo "❌ Coverage ${coverage}% is below threshold ${threshold}%"
          exit 1
        fi
        echo "✅ Coverage ${coverage}% meets threshold ${threshold}%"
      working-directory: ./backend

    - name: Upload Coverage to Codecov
      uses: codecov/codecov-action@v3
      with:
        files: ./backend/coverage.out
        flags: integration
        name: integration-tests
        verbose: true
      continue-on-error: true

    - name: Run Unit Tests (Service Layer)
      run: |
        go test -v ./services/payment/service_test.go \
          -timeout 60s \
          -coverprofile=service_coverage.out
      working-directory: ./backend

    - name: Run Stress Tests
      run: |
        go test -v ./tests/integration -run "TestHighConcurrency|TestCache|TestDatabase|TestRace" \
          -timeout 300s
      working-directory: ./backend

    - name: Create Test Summary
      if: always()
      run: |
        echo "## Integration Test Results" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "**Service**: Payment Service" >> $GITHUB_STEP_SUMMARY
        echo "**Tests**: 68+" >> $GITHUB_STEP_SUMMARY
        echo "**Phases**: Service Layer, HTTP Handlers, Workflows, Stress, Consistency" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "✅ All integration tests completed" >> $GITHUB_STEP_SUMMARY

  test-handler-layer:
    name: Test HTTP Handlers
    runs-on: ubuntu-latest
    timeout-minutes: 10

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: pintuotuo
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: pintuotuo_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v4
      with:
        go-version: '1.21'
        cache: true
        cache-dependency-path: 'backend/go.sum'

    - name: Download dependencies
      run: go mod download
      working-directory: ./backend

    - name: Run Handler Tests
      run: |
        go test -v ./handlers/payment_integration_test.go \
          -timeout 60s
      working-directory: ./backend

  code-quality:
    name: Code Quality Checks
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v4
      with:
        go-version: '1.21'
        cache: true
        cache-dependency-path: 'backend/go.sum'

    - name: Run golangci-lint
      uses: golangci/golangci-lint-action@v3
      with:
        version: latest
        working-directory: ./backend
        args: --timeout=5m
      continue-on-error: true

    - name: Run go vet
      run: go vet ./...
      working-directory: ./backend

    - name: Check code formatting
      run: |
        if ! gofmt -l . | grep -q .; then
          echo "✅ Code is properly formatted"
        else
          echo "❌ Code formatting issues found:"
          gofmt -l .
          exit 1
        fi
      working-directory: ./backend

  notify-results:
    name: Notify Results
    runs-on: ubuntu-latest
    needs: [integration-tests, test-handler-layer, code-quality]
    if: always()

    steps:
    - name: Check test results
      run: |
        if [[ "${{ needs.integration-tests.result }}" == "failure" ]] || \
           [[ "${{ needs.test-handler-layer.result }}" == "failure" ]]; then
          echo "❌ Tests failed - see details above"
          exit 1
        fi
        echo "✅ All tests passed successfully!"

    - name: Notify Slack on Failure
      if: failure()
      uses: slackapi/slack-github-action@v1.24.0
      with:
        payload: |
          {
            "text": "❌ Integration Tests Failed",
            "blocks": [
              {
                "type": "section",
                "text": {
                  "type": "mrkdwn",
                  "text": "*Repository:* ${{ github.repository }}\n*Branch:* ${{ github.ref_name }}\n*Commit:* ${{ github.sha }}\n*Author:* ${{ github.actor }}\n*Message:* Integration tests failed"
                }
              },
              {
                "type": "actions",
                "elements": [
                  {
                    "type": "button",
                    "text": {
                      "type": "plain_text",
                      "text": "View Workflow"
                    },
                    "url": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
                  }
                ]
              }
            ]
          }
      env:
        SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
      continue-on-error: true

    - name: Notify Slack on Success
      if: success()
      uses: slackapi/slack-github-action@v1.24.0
      with:
        payload: |
          {
            "text": "✅ Integration Tests Passed",
            "blocks": [
              {
                "type": "section",
                "text": {
                  "type": "mrkdwn",
                  "text": "*Repository:* ${{ github.repository }}\n*Branch:* ${{ github.ref_name }}\n*Tests:* 68+ integration tests passed\n*Coverage:* >85%"
                }
              }
            ]
          }
      env:
        SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
      continue-on-error: true
