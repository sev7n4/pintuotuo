name: E2E Tests

on:
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Test environment'
        required: false
        default: 'staging'
        type: choice
        options:
          - staging
          - production

permissions:
  contents: read
  actions: read

env:
  GO_VERSION: '1.21'
  NODE_VERSION: '18'

jobs:
  e2e-tests:
    name: E2E Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: pintuotuo
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: pintuotuo_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install backend dependencies
        working-directory: ./backend
        run: go mod download

      - name: Install frontend dependencies
        working-directory: ./frontend
        run: npm install

      - name: Install Playwright browsers
        working-directory: ./frontend
        run: npx playwright install --with-deps chromium

      - name: Build frontend
        working-directory: ./frontend
        env:
          VITE_API_BASE_URL: http://localhost:8080/api/v1
        run: |
          rm -rf dist
          npm run build

      # 迁移仅由 backend 启动时的 db.RunMigrations 执行（与 schema_migrations 一致）。
      # 切勿再用 psql 全量跑 migrations/*.sql：会先于 Go 执行 021 等脚本并 DROP products，
      # 随后 Go 误将 001 标为已执行，导致「users 存在、products 不存在」的坏状态。

      - name: Start backend server
        working-directory: ./backend
        env:
          DATABASE_URL: postgres://pintuotuo:test_password@localhost:5432/pintuotuo_test?sslmode=disable
          REDIS_URL: redis://localhost:6379
          JWT_SECRET: pintuotuo-secret-key-dev
          ENCRYPTION_KEY: test-encryption-key-32-characters
          GIN_MODE: test
          PORT: 8080
        run: |
          go run main.go 2>&1 | tee /tmp/backend.log &
          for i in {1..30}; do
            sleep 1
            if curl -sf http://localhost:8080/api/v1/health > /dev/null 2>&1; then
              echo "Backend server is healthy!"
              exit 0
            fi
            echo "Waiting for backend... ($i/30)"
          done
          echo "Backend failed to start. Logs:"
          cat /tmp/backend.log
          exit 1

      - name: Seed test data
        working-directory: ./backend
        env:
          DATABASE_URL: postgres://pintuotuo:test_password@localhost:5432/pintuotuo_test?sslmode=disable
        run: |
          psql "$DATABASE_URL" -f ../scripts/db/seed_test_data.sql

      - name: Start frontend preview server
        working-directory: ./frontend
        run: |
          npx serve -s dist -l 5173 &
          sleep 3

      - name: Run E2E tests
        working-directory: ./frontend
        env:
          CI: true
        run: npm run test:e2e

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 7

      - name: Upload test screenshots
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-screenshots
          path: frontend/test-results/
          retention-days: 7

  notify:
    name: Notify Status
    runs-on: ubuntu-latest
    needs: [e2e-tests]
    if: always()

    steps:
      - name: Check job status
        run: |
          echo "## E2E Tests Pipeline Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| E2E Tests | ${{ needs.e2e-tests.result }} |" >> $GITHUB_STEP_SUMMARY
