name: Deploy to Tencent Cloud

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to deploy'
        required: true
        default: 'main'

permissions:
  contents: read
  packages: write

jobs:
  deploy:
    name: Deploy to Tencent Cloud
    runs-on: ubuntu-latest
    environment: production

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.branch || github.ref }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/pintuotuo-backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/pintuotuo-frontend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy to Tencent Cloud
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.TENCENT_CLOUD_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

          ssh -o StrictHostKeyChecking=no -i ~/.ssh/deploy_key ${{ secrets.TENCENT_CLOUD_USER }}@${{ secrets.TENCENT_CLOUD_IP }} << 'EOF'
          set -e
          cd ${{ secrets.TENCENT_CLOUD_PROJECT_DIR }}
          echo "Fetching latest code from GitHub..."
          git fetch origin main
          git reset --hard origin/main
          echo "Login GHCR and pull prebuilt images..."
          echo "${{ github.token }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin
          for i in 1 2 3 4 5; do
            if IMAGE_TAG=${{ github.sha }} docker-compose -f docker-compose.prod.yml -f docker-compose.prod.images.yml --profile llm-gateway pull; then
              break
            fi
            if [ "$i" -eq 5 ]; then
              echo "ERROR: docker compose pull failed after $i attempts"
              exit 1
            fi
            sleep $((i * 20))
          done
          echo "Starting containers (no server-side build)..."
          IMAGE_TAG=${{ github.sha }} docker-compose -f docker-compose.prod.yml -f docker-compose.prod.images.yml --profile llm-gateway up -d
          echo "Force recreating litellm container to ensure latest image..."
          docker compose -f docker-compose.prod.yml --profile llm-gateway up -d --force-recreate litellm || true
          echo "Running database migrations..."
          for migration_file in backend/migrations/*.sql; do
            filename=$(basename "$migration_file")
            echo "Checking migration: $filename"
            # Extract SQL between "-- +goose Up" and "-- +goose Down" for goose-formatted migrations
            # If no goose markers, execute the entire file
            migration_sql=$(sed -n '/-- +goose Up/,/-- +goose Down/p' "$migration_file" | sed '1d;$d' | sed '/-- +goose StatementBegin/d' | sed '/-- +goose StatementEnd/d')
            if [ -n "$migration_sql" ]; then
              echo "Executing goose-formatted migration: $filename"
              echo "$migration_sql" | docker exec -i pintuotuo-postgres psql -U pintuotuo -d pintuotuo_db -v ON_ERROR_STOP=1 2>&1 || echo "Migration $filename may have already been applied or had non-fatal errors"
            else
              echo "Executing plain SQL migration: $filename"
              docker exec pintuotuo-postgres psql -U pintuotuo -d pintuotuo_db -v ON_ERROR_STOP=1 -f "/docker-entrypoint-initdb.d/$filename" 2>&1 || echo "Migration $filename may have already been applied or had non-fatal errors"
            fi
          done
          echo "Migrations completed"
          echo "Pruning dangling images to keep disk stable..."
          docker image prune -f >/dev/null || true
          echo "Verifying gateway containers are running..."
          if ! docker ps --format '{{.Names}}' | grep -q '^pintuotuo-litellm$'; then
            echo "ERROR: pintuotuo-litellm not in running containers"
            docker ps -a
            exit 1
          fi
          echo "Gateway container OK (litellm)."
          echo "Seeding database..."
          docker exec pintuotuo-postgres psql -U pintuotuo -d pintuotuo_db -c "INSERT INTO users (email, name, password_hash, role, status) VALUES ('admin@example.com', 'Admin', 'd5ab7a93ed8183930bbac413b2b46c159788e64b789a6da2b63cc56a7c6d1e05', 'admin', 'active') ON CONFLICT (email) DO UPDATE SET password_hash = EXCLUDED.password_hash;"
          echo "Seed user password update completed"
          echo 'Deployment completed successfully'
          EOF

          rm -f ~/.ssh/deploy_key

      # 1) /api/v1/health：进程存活（必选，标准项）
      # 2) catalog：Repository variable DEPLOY_VERIFY_CATALOG_SKU_ID 有值时断言 GET /catalog/{id}；
      #    未设置时断言 GET /catalog 列表（空列表也应 200）。二者二选一，不作为「替代 health」。
      - name: Verify deployment
        env:
          VERIFY_SKU_ID: ${{ vars.DEPLOY_VERIFY_CATALOG_SKU_ID }}
        run: |
          set -e
          BASE="http://${{ secrets.TENCENT_CLOUD_IP }}:8080"
          echo "=== 1) 进程健康检查: GET /api/v1/health（必选）==="
          OK=0
          for i in $(seq 1 20); do
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
              --connect-timeout 5 \
              --max-time 10 \
              "${BASE}/api/v1/health" 2>/dev/null || echo "000")
            if [ "$HTTP_CODE" = "200" ]; then
              echo "✅ Health OK (HTTP $HTTP_CODE)"
              OK=1
              break
            fi
            echo "Attempt $i: health HTTP $HTTP_CODE, waiting..."
            
            # 指数退避策略
            if [ $i -le 5 ]; then
              sleep 5
            elif [ $i -le 10 ]; then
              sleep 10
            else
              sleep 15
            fi
          done
          if [ "$OK" != "1" ]; then
            echo "❌ /api/v1/health 未在约 200s 内返回 200"
            exit 1
          fi

          echo "=== 2) Catalog 断言（health 通过后再执行；列表或固定 SKU 二选一）==="
          if [ -n "$VERIFY_SKU_ID" ]; then
            echo "使用仓库变量 DEPLOY_VERIFY_CATALOG_SKU_ID=$VERIFY_SKU_ID → GET /api/v1/catalog/${VERIFY_SKU_ID}"
            C_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
              --connect-timeout 5 \
              --max-time 10 \
              "${BASE}/api/v1/catalog/${VERIFY_SKU_ID}" 2>/dev/null || echo "000")
          else
            echo "未设置 DEPLOY_VERIFY_CATALOG_SKU_ID → GET /api/v1/catalog?page=1&per_page=1（列表）"
            C_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
              --connect-timeout 5 \
              --max-time 10 \
              "${BASE}/api/v1/catalog?page=1&per_page=1" 2>/dev/null || echo "000")
          fi
          if [ "$C_CODE" = "200" ]; then
            echo "✅ Catalog 断言通过 (HTTP $C_CODE)"
          else
            echo "❌ Catalog 断言失败 (HTTP $C_CODE)。可在 GitHub Repository variables 中设置 DEPLOY_VERIFY_CATALOG_SKU_ID 为环境中存在的 SKU id。"
            exit 1
          fi

      - name: Notify deployment status
        if: always()
        run: |
          echo "## Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Environment | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Tencent Cloud | ${{ job.status }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Branch | ${{ github.event.inputs.branch || github.ref_name }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Server | ${{ secrets.TENCENT_CLOUD_IP }} |" >> $GITHUB_STEP_SUMMARY

      - name: Send email notification
        if: always()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ secrets.SMTP_SERVER || 'smtp.gmail.com' }}
          server_port: ${{ secrets.SMTP_PORT || 587 }}
          username: ${{ secrets.SMTP_USERNAME }}
          password: ${{ secrets.SMTP_PASSWORD }}
          subject: "[Deployment] Pintuotuo Project - ${{ job.status }}"
          body: |
            Deployment Status: ${{ job.status }}
            Branch: ${{ github.event.inputs.branch || github.ref_name }}
            Server: ${{ secrets.TENCENT_CLOUD_IP }}
            Commit: ${{ github.sha }}
            Deployed by: ${{ github.actor }}
            
            View deployment details: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          to: ${{ secrets.DEPLOYMENT_NOTIFICATION_EMAIL }}
          from: "GitHub Actions <${{ secrets.SMTP_USERNAME }}>"
        continue-on-error: true

      # 过激进会删掉仍被 main / 手动部署引用的 tag，导致服务器 docker compose pull 报 manifest not found。
      # 与 backend / frontend 各保留最近若干「包版本」（通常对应每次 push 的 sha tag）。
      - name: Cleanup GHCR tags (keep latest 15 per package)
        if: always()
        uses: actions/github-script@v7
        continue-on-error: true
        with:
          script: |
            const keep = 15;
            const owner = context.repo.owner;
            const packages = ['pintuotuo-backend', 'pintuotuo-frontend'];

            for (const pkg of packages) {
              const versions = await github.paginate(
                github.rest.packages.getAllPackageVersionsForPackageOwnedByUser,
                {
                  package_type: 'container',
                  package_name: pkg,
                  username: owner,
                  per_page: 100,
                }
              );

              versions.sort((a, b) => new Date(b.created_at) - new Date(a.created_at));
              const stale = versions.slice(keep);

              core.info(`${pkg}: total=${versions.length}, delete=${stale.length}`);
              for (const v of stale) {
                await github.rest.packages.deletePackageVersionForUser({
                  package_type: 'container',
                  package_name: pkg,
                  username: owner,
                  package_version_id: v.id,
                });
                core.info(`deleted ${pkg}@${v.name} (${v.id})`);
              }
            }