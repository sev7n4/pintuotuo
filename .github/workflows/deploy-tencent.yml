name: Deploy to Tencent Cloud

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to deploy'
        required: true
        default: 'main'

permissions:
  contents: read
  packages: write

jobs:
  deploy:
    name: Deploy to Tencent Cloud
    runs-on: ubuntu-latest
    environment: production

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.branch || github.ref }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/pintuotuo-backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/pintuotuo-frontend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy to Tencent Cloud
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.TENCENT_CLOUD_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

          ssh -o StrictHostKeyChecking=no -i ~/.ssh/deploy_key ${{ secrets.TENCENT_CLOUD_USER }}@${{ secrets.TENCENT_CLOUD_IP }} << 'EOF'
          set -e
          cd ${{ secrets.TENCENT_CLOUD_PROJECT_DIR }}
          echo "[$(date +%H:%M:%S)] Fetching latest code from GitHub..."
          git fetch origin main
          git reset --hard origin/main
          echo "[$(date +%H:%M:%S)] Login GHCR and pull prebuilt images..."
          echo "${{ github.token }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

          echo "[$(date +%H:%M:%S)] Configuring Docker daemon for GHCR reliability..."
          cat /etc/docker/daemon.json 2>/dev/null || echo "{}" > /tmp/daemon_base.json
          python3 -c "
          import json, sys
          try:
            with open('/etc/docker/daemon.json') as f:
              cfg = json.load(f)
          except:
            cfg = {}
          cfg.setdefault('registry-mirrors', [])
          cfg['max-concurrent-downloads'] = 2
          cfg['max-concurrent-uploads'] = 2
          with open('/tmp/daemon_new.json', 'w') as f:
            json.dump(cfg, f, indent=2)
          " 2>/dev/null || true
          if [ -f /tmp/daemon_new.json ]; then
            sudo cp /tmp/daemon_new.json /etc/docker/daemon.json
            sudo systemctl restart docker
            echo "Docker daemon restarted with optimized config"
            sleep 3
          fi

          PULL_SUCCESS=0
          for i in 1 2 3 4 5; do
            echo "[$(date +%H:%M:%S)] Pull attempt $i/5..."
            if IMAGE_TAG=${{ github.sha }} docker-compose -f docker-compose.prod.yml -f docker-compose.prod.images.yml pull 2>&1; then
              PULL_SUCCESS=1
              break
            fi
            echo "[$(date +%H:%M:%S)] Pull attempt $i failed, cleaning up and retrying..."
            docker system prune -f >/dev/null 2>&1 || true
            if [ "$i" -lt 5 ]; then
              sleep $((i * 10))
            fi
          done
          if [ "$PULL_SUCCESS" != "1" ]; then
            echo "ERROR: docker compose pull failed after 5 attempts"
            exit 1
          fi
          echo "[$(date +%H:%M:%S)] Images pulled successfully"
          echo "[$(date +%H:%M:%S)] Starting containers..."
          IMAGE_TAG=${{ github.sha }} docker-compose -f docker-compose.prod.yml -f docker-compose.prod.images.yml -f docker-compose.proxy.override.yml up -d
          echo "[$(date +%H:%M:%S)] Running database migrations..."
          docker exec pintuotuo-postgres psql -U pintuotuo -d pintuotuo_db -c "CREATE TABLE IF NOT EXISTS _schema_migrations (version VARCHAR(255) PRIMARY KEY, applied_at TIMESTAMP DEFAULT NOW());" 2>/dev/null || true
          for migration_file in backend/migrations/*.sql; do
            filename=$(basename "$migration_file")
            already_applied=$(docker exec pintuotuo-postgres psql -U pintuotuo -d pintuotuo_db -tAc "SELECT COUNT(*) FROM _schema_migrations WHERE version = '$filename';" 2>/dev/null || echo "0")
            if [ "$already_applied" = "1" ]; then
              continue
            fi
            echo "Applying migration: $filename"
            migration_sql=$(sed -n '/-- +goose Up/,/-- +goose Down/p' "$migration_file" | sed '1d;$d' | sed '/-- +goose StatementBegin/d' | sed '/-- +goose StatementEnd/d')
            if [ -n "$migration_sql" ]; then
              echo "$migration_sql" | docker exec -i pintuotuo-postgres psql -U pintuotuo -d pintuotuo_db -v ON_ERROR_STOP=1 2>&1 || echo "Migration $filename may have already been applied or had non-fatal errors"
            else
              docker exec pintuotuo-postgres psql -U pintuotuo -d pintuotuo_db -v ON_ERROR_STOP=1 -f "/docker-entrypoint-initdb.d/$filename" 2>&1 || echo "Migration $filename may have already been applied or had non-fatal errors"
            fi
            docker exec pintuotuo-postgres psql -U pintuotuo -d pintuotuo_db -c "INSERT INTO _schema_migrations (version) VALUES ('$filename') ON CONFLICT (version) DO NOTHING;" 2>/dev/null || true
          done
          echo "[$(date +%H:%M:%S)] Migrations completed"
          echo "Pruning dangling images to keep disk stable..."
          docker image prune -f >/dev/null || true
          echo "Seeding database..."
          docker exec pintuotuo-postgres psql -U pintuotuo -d pintuotuo_db -c "INSERT INTO users (email, name, password_hash, role, status) VALUES ('admin@example.com', 'Admin', 'd5ab7a93ed8183930bbac413b2b46c159788e64b789a6da2b63cc56a7c6d1e05', 'admin', 'active') ON CONFLICT (email) DO UPDATE SET password_hash = EXCLUDED.password_hash;"
          echo "Seed user password update completed"
          echo "[$(date +%H:%M:%S)] Deployment completed successfully"
          EOF

          rm -f ~/.ssh/deploy_key

      - name: Verify deployment
        env:
          VERIFY_SKU_ID: ${{ vars.DEPLOY_VERIFY_CATALOG_SKU_ID }}
        run: |
          set -e
          BASE="http://${{ secrets.TENCENT_CLOUD_IP }}:8080"
          echo "=== 1) Health check: GET /api/v1/health ==="
          OK=0
          for i in $(seq 1 20); do
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
              --connect-timeout 5 \
              --max-time 10 \
              "${BASE}/api/v1/health" 2>/dev/null || echo "000")
            if [ "$HTTP_CODE" = "200" ]; then
              echo "Health OK (HTTP $HTTP_CODE) after attempt $i"
              OK=1
              break
            fi
            echo "Attempt $i: health HTTP $HTTP_CODE, waiting..."
            if [ $i -le 5 ]; then
              sleep 5
            elif [ $i -le 10 ]; then
              sleep 10
            else
              sleep 15
            fi
          done
          if [ "$OK" != "1" ]; then
            echo "Health check failed after 20 attempts"
            exit 1
          fi

          echo "=== 2) Catalog assertion ==="
          if [ -n "$VERIFY_SKU_ID" ]; then
            echo "Using DEPLOY_VERIFY_CATALOG_SKU_ID=$VERIFY_SKU_ID"
            C_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
              --connect-timeout 5 \
              --max-time 10 \
              "${BASE}/api/v1/catalog/${VERIFY_SKU_ID}" 2>/dev/null || echo "000")
          else
            echo "No DEPLOY_VERIFY_CATALOG_SKU_ID set, checking catalog list"
            C_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
              --connect-timeout 5 \
              --max-time 10 \
              "${BASE}/api/v1/catalog?page=1&per_page=1" 2>/dev/null || echo "000")
          fi
          if [ "$C_CODE" = "200" ]; then
            echo "Catalog assertion passed (HTTP $C_CODE)"
          else
            echo "Catalog assertion failed (HTTP $C_CODE)"
            exit 1
          fi

      - name: Notify deployment status
        if: always()
        run: |
          echo "## Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Environment | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Tencent Cloud | ${{ job.status }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Branch | ${{ github.event.inputs.branch || github.ref_name }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Server | ${{ secrets.TENCENT_CLOUD_IP }} |" >> $GITHUB_STEP_SUMMARY

      - name: Send email notification
        if: always()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ secrets.SMTP_SERVER || 'smtp.gmail.com' }}
          server_port: ${{ secrets.SMTP_PORT || 587 }}
          username: ${{ secrets.SMTP_USERNAME }}
          password: ${{ secrets.SMTP_PASSWORD }}
          subject: "[Deployment] Pintuotuo Project - ${{ job.status }}"
          body: |
            Deployment Status: ${{ job.status }}
            Branch: ${{ github.event.inputs.branch || github.ref_name }}
            Server: ${{ secrets.TENCENT_CLOUD_IP }}
            Commit: ${{ github.sha }}
            Deployed by: ${{ github.actor }}

            View deployment details: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          to: ${{ secrets.DEPLOYMENT_NOTIFICATION_EMAIL }}
          from: "GitHub Actions <${{ secrets.SMTP_USERNAME }}>"
        continue-on-error: true

      - name: Cleanup GHCR tags (keep latest 15 per package)
        if: always()
        uses: actions/github-script@v7
        continue-on-error: true
        with:
          script: |
            const keep = 15;
            const owner = context.repo.owner;
            const packages = ['pintuotuo-backend', 'pintuotuo-frontend'];

            for (const pkg of packages) {
              const versions = await github.paginate(
                github.rest.packages.getAllPackageVersionsForPackageOwnedByUser,
                {
                  package_type: 'container',
                  package_name: pkg,
                  username: owner,
                  per_page: 100,
                }
              );

              versions.sort((a, b) => new Date(b.created_at) - new Date(a.created_at));
              const stale = versions.slice(keep);

              core.info(`${pkg}: total=${versions.length}, delete=${stale.length}`);
              for (const v of stale) {
                await github.rest.packages.deletePackageVersionForUser({
                  package_type: 'container',
                  package_name: pkg,
                  username: owner,
                  package_version_id: v.id,
                });
                core.info(`deleted ${pkg}@${v.name} (${v.id})`);
              }
            }
