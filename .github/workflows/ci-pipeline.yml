name: CI Pipeline

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

jobs:
  backend-tests:
    name: Backend Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: pintuotuo
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: pintuotuo_test
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.21'
          cache: true
          cache-dependency-path: 'backend/go.sum'

      - name: Install dependencies
        working-directory: ./backend
        run: |
          go mod download
          go mod verify

      - name: Install PostgreSQL Client
        run: sudo apt-get update && sudo apt-get install -y postgresql-client

      - name: Initialize database schema
        run: |
          # Wait for PostgreSQL to be ready
          until pg_isready -h localhost -p 5432 -U pintuotuo; do
            echo 'Waiting for PostgreSQL...'
            sleep 1
          done
          psql -h localhost -U pintuotuo -d pintuotuo_test -f scripts/db/full_schema.sql
        env:
          PGPASSWORD: test_password

      - name: Run tests
        working-directory: ./backend
        env:
          DATABASE_URL: postgresql://pintuotuo:test_password@localhost:5432/pintuotuo_test?sslmode=disable
          REDIS_URL: redis://localhost:6379
          JWT_SECRET: pintuotuo-secret-key-dev
          GIN_MODE: release
          TEST_MODE: true
        run: go test -v -count=1 -p 1 ./...

  frontend-tests:
    name: Frontend Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: 'frontend/package.json'

      - name: Install dependencies
        working-directory: ./frontend
        run: npm install

      - name: Build frontend
        working-directory: ./frontend
        run: npm run build

      - name: Run tests
        working-directory: ./frontend
        run: npm test --if-present --watchAll=false
