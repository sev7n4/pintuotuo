version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: pintuotuo_postgres
    environment:
      POSTGRES_USER: ${DB_USER:-pintuotuo}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME:-pintuotuo_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/db/full_schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    command: postgres -c max_connections=200
    networks:
      - pintuotuo_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-pintuotuo}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: pintuotuo_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    networks:
      - pintuotuo_network
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    image: ${DOCKER_REGISTRY}/pintuotuo-backend:${VERSION:-latest}
    container_name: pintuotuo_backend
    environment:
      DATABASE_URL: "postgresql://${DB_USER:-pintuotuo}:${DB_PASSWORD}@postgres:5432/${DB_NAME:-pintuotuo_db}?sslmode=disable"
      REDIS_URL: "redis://:${REDIS_PASSWORD}@redis:6379"
      JWT_SECRET: ${JWT_SECRET}
      GIN_MODE: ${GIN_MODE:-release}
      PORT: 8080
      APP_ENV: ${APP_ENV:-production}
      APP_LOG_LEVEL: ${APP_LOG_LEVEL:-info}
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - pintuotuo_network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          cpus: '0.5'
          memory: 256M

  nginx:
    image: nginx:alpine
    container_name: pintuotuo_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl/:/etc/nginx/ssl:ro
    depends_on:
      - backend
    networks:
      - pintuotuo_network
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  pintuotuo_network:
    driver: bridge
