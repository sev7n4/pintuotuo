version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: pintuotuo-backend
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
      - GIN_MODE=release
      - DATABASE_URL=postgresql://pintuotuo:${DB_PASSWORD}@postgres:5432/pintuotuo_db?sslmode=disable
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=${JWT_SECRET}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
      - DB_MAX_OPEN_CONNS=50
      - DB_MAX_IDLE_CONNS=10
      - DB_CONN_MAX_LIFETIME=30m
      - DB_CONN_MAX_IDLE_TIME=10m
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS:-http://localhost:3000}
      - ALIPAY_APP_ID=${ALIPAY_APP_ID}
      - ALIPAY_PRIVATE_KEY=${ALIPAY_PRIVATE_KEY}
      - ALIPAY_PUBLIC_KEY=${ALIPAY_PUBLIC_KEY}
      - ALIPAY_RETURN_URL=${ALIPAY_RETURN_URL}
      - ALIPAY_NOTIFY_URL=${ALIPAY_NOTIFY_URL}
      - ALIPAY_SANDBOX=${ALIPAY_SANDBOX:-true}
      - WECHAT_APP_ID=${WECHAT_APP_ID}
      - WECHAT_MCH_ID=${WECHAT_MCH_ID}
      - WECHAT_API_KEY=${WECHAT_API_KEY}
      - WECHAT_NOTIFY_URL=${WECHAT_NOTIFY_URL}
      - WECHAT_SANDBOX=${WECHAT_SANDBOX:-true}
      - ALLOW_TEST_RECHARGE=${ALLOW_TEST_RECHARGE:-false}
      # 权益与计价：off 兼容历史；strict 时 API 代理仅允许订单/订阅覆盖的 (provider, model)
      - ENTITLEMENT_ENFORCEMENT=${ENTITLEMENT_ENFORCEMENT:-off}
      # 登录 / OAuth / 短信：与根目录 .env.example 一致，由服务器 .env 注入
      - FRONTEND_URL=${FRONTEND_URL:-}
      - PUBLIC_API_BASE_URL=${PUBLIC_API_BASE_URL:-}
      - MOCK_SMS=${MOCK_SMS:-}
      - SMS_PROVIDER=${SMS_PROVIDER:-}
      - AUTH_MAGIC_LINK=${AUTH_MAGIC_LINK:-}
      - EMAIL_MAGIC_MOCK=${EMAIL_MAGIC_MOCK:-}
      - SMTP_HOST=${SMTP_HOST:-}
      - SMTP_PORT=${SMTP_PORT:-}
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASSWORD=${SMTP_PASSWORD:-}
      - SMTP_FROM=${SMTP_FROM:-}
      - GITHUB_OAUTH_CLIENT_ID=${GITHUB_OAUTH_CLIENT_ID:-}
      - GITHUB_OAUTH_CLIENT_SECRET=${GITHUB_OAUTH_CLIENT_SECRET:-}
      - GITHUB_OAUTH_REDIRECT_URI=${GITHUB_OAUTH_REDIRECT_URI:-}
      - GITHUB_OAUTH_SCOPE=${GITHUB_OAUTH_SCOPE:-}
      - WECHAT_OPEN_APP_ID=${WECHAT_OPEN_APP_ID:-}
      - WECHAT_OPEN_APP_SECRET=${WECHAT_OPEN_APP_SECRET:-}
      - WECHAT_OAUTH_REDIRECT_URI=${WECHAT_OAUTH_REDIRECT_URI:-}
      - AUTH_ACCOUNT_LINKING=${AUTH_ACCOUNT_LINKING:-}
      # 邀请制商户入驻 / 管理员安全策略
      - MERCHANT_REGISTER_MODE=${MERCHANT_REGISTER_MODE:-open}
      - ADMIN_MFA_REQUIRED=${ADMIN_MFA_REQUIRED:-false}
      - ADMIN_ALLOWED_CIDRS=${ADMIN_ALLOWED_CIDRS:-}
      - MFA_TOTP_ISSUER=${MFA_TOTP_ISSUER:-Pintuotuo}
      - PUBLIC_APP_BASE_URL=${PUBLIC_APP_BASE_URL:-}
      - FRONTEND_ORIGIN=${FRONTEND_ORIGIN:-}
      # Execution Layer 灰度开关（Phase 3）
      - USE_EXECUTION_LAYER=${USE_EXECUTION_LAYER:-false}
      # LiteLLM 网关配置（当 merchant_api_keys.route_mode = 'litellm' 时使用）
      - API_PROXY_LITELLM_MAX_RETRIES=${API_PROXY_LITELLM_MAX_RETRIES:-1}
      - LLM_GATEWAY_LITELLM_URL=${LLM_GATEWAY_LITELLM_URL:-http://litellm:4000}
      # LiteLLM 鉴权：当 route_mode=litellm 时用作 Authorization Bearer
      - LITELLM_MASTER_KEY=${LITELLM_MASTER_KEY:-}
      - LANGFUSE_ENABLED=${LANGFUSE_ENABLED:-false}
      - LANGFUSE_PUBLIC_KEY=${LANGFUSE_PUBLIC_KEY:-}
      - LANGFUSE_SECRET_KEY=${LANGFUSE_SECRET_KEY:-}
      - LANGFUSE_HOST=${LANGFUSE_HOST:-}
      # 勿在此注入 HTTP(S)_PROXY 空值：会导致 Go 出站行为与未设置时不一致。
      # 若大陆机房必须走代理访问 github.com，请使用 docker-compose.proxy.override.yml.example 合并启动。
      # OpenTelemetry → Grafana Tempo（OTLP gRPC）；不配 endpoint 时后端为 noop
      - OTEL_EXPORTER_OTLP_ENDPOINT=${OTEL_EXPORTER_OTLP_ENDPOINT:-http://tempo:4317}
      - OTEL_SERVICE_NAME=${OTEL_SERVICE_NAME:-pintuotuo-backend}
      - OTEL_SDK_DISABLED=${OTEL_SDK_DISABLED:-}
      - OTEL_TRACES_SAMPLER=${OTEL_TRACES_SAMPLER:-}
      - OTEL_TRACES_SAMPLER_ARG=${OTEL_TRACES_SAMPLER_ARG:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - pintuotuo-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/api/v1/health/ready"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=${VITE_API_URL:-http://backend:8080/api/v1}
        - VITE_ALLOW_MOCK_RECHARGE=${VITE_ALLOW_MOCK_RECHARGE:-false}
        - VITE_MERCHANT_REGISTER_MODE=${VITE_MERCHANT_REGISTER_MODE:-open}
    container_name: pintuotuo-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - pintuotuo-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  postgres:
    image: postgres:15-alpine
    container_name: pintuotuo-postgres
    restart: unless-stopped
    environment:
      - POSTGRES_USER=pintuotuo
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_DB=pintuotuo_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/migrations:/docker-entrypoint-initdb.d:ro
    ports:
      - "5432:5432"
    networks:
      - pintuotuo-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pintuotuo -d pintuotuo_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"

  redis:
    image: redis:7-alpine
    container_name: pintuotuo-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    networks:
      - pintuotuo-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  prometheus:
    image: prom/prometheus:v2.48.0
    container_name: pintuotuo-prometheus
    restart: unless-stopped
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=7d'
      - '--web.enable-lifecycle'
    volumes:
      - ./deploy/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./deploy/prometheus/rules:/etc/prometheus/rules:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    networks:
      - pintuotuo-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  grafana:
    image: grafana/grafana:10.2.0
    container_name: pintuotuo-grafana
    restart: unless-stopped
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-admin123}
      - GF_USERS_ALLOW_SIGN_UP=false
      # 与 ROOT_URL 中带 /grafana/ 子路径配套；未开启时浏览器访问会出现 /grafana/login 无限重定向
      - GF_SERVER_SERVE_FROM_SUB_PATH=true
      - GF_SERVER_ROOT_URL=%(protocol)s://%(domain)s:%(http_port)s/grafana/
    volumes:
      - grafana_data:/var/lib/grafana
      - ./deploy/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./deploy/grafana/dashboards:/etc/grafana/dashboards:ro
    ports:
      - "3001:3000"
    depends_on:
      - prometheus
      - tempo
    networks:
      - pintuotuo-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  tempo:
    image: grafana/tempo:2.3.1
    container_name: pintuotuo-tempo
    restart: unless-stopped
    command: ["-config.file=/etc/tempo/tempo.yaml"]
    volumes:
      - ./deploy/tempo/tempo.yaml:/etc/tempo/tempo.yaml:ro
      - tempo_data:/var/tempo
    ports:
      - "3200:3200"
      - "4317:4317"
      - "4318:4318"
    networks:
      - pintuotuo-network
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"

  alertmanager:
    image: prom/alertmanager:v0.27.0
    container_name: pintuotuo-alertmanager
    restart: unless-stopped
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'
      - '--storage.path=/alertmanager'
    volumes:
      - ./deploy/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - alertmanager_data:/alertmanager
    ports:
      - "9093:9093"
    networks:
      - pintuotuo-network

  litellm:
    image: litellm/litellm-database:v1.83.3-stable
    container_name: pintuotuo-litellm
    restart: unless-stopped
    environment:
      - DATABASE_URL=postgresql://pintuotuo:${DB_PASSWORD}@postgres:5432/pintuotuo_db?sslmode=disable
      - LITELLM_MASTER_KEY=${LITELLM_MASTER_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - MOONSHOT_API_KEY=${MOONSHOT_API_KEY:-}
      - MINIMAX_API_KEY=${MINIMAX_API_KEY:-}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY:-}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY:-}
      - ZAI_API_KEY=${ZAI_API_KEY:-}
      - STEPFUN_API_KEY=${STEPFUN_API_KEY:-}
      - DASHSCOPE_API_KEY=${DASHSCOPE_API_KEY:-}
      - OTEL_SERVICE_NAME=${LITELLM_OTEL_SERVICE_NAME:-litellm-proxy}
      - OTEL_EXPORTER_OTLP_ENDPOINT=${LITELLM_OTEL_EXPORTER_OTLP_ENDPOINT:-http://tempo:4318}
    volumes:
      - ./deploy/litellm/litellm_proxy_config.yaml:/app/litellm_proxy_config.yaml:ro
    command:
      [
        "--config",
        "/app/litellm_proxy_config.yaml",
        "--host",
        "0.0.0.0",
        "--port",
        "4000",
      ]
    ports:
      - "4000:4000"
    networks:
      - pintuotuo-network
    depends_on:
      postgres:
        condition: service_healthy
    profiles: ["llm-gateway"]

networks:
  pintuotuo-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  prometheus_data:
  grafana_data:
  alertmanager_data:
  tempo_data:
