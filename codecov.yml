coverage:
  status:
    project:
      default:
        target: 80
        threshold: 1
        branches: null
        flags: null
    patch:
      default:
        target: 80
        threshold: 1
        branches: null
    changes:
      default:
        target: 80
        threshold: 1
        branches: null

comment:
  layout: "reach,diff,flags,tree"
  behavior: default
  require_changes: false
  require_base: true
  require_head: true
  hide_project_coverage: false

ignore:
  - "**/*_test.go"
  - "**/mocks/**"
  - "**/vendor/**"
