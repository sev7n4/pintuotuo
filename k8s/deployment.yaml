apiVersion: apps/v1
kind: Deployment
metadata:
  name: pintuotuo-backend
  labels:
    app: pintuotuo
    component: backend
spec:
  replicas: 3
  selector:
    matchLabels:
      app: pintuotuo
      component: backend
  template:
    metadata:
      labels:
        app: pintuotuo
        component: backend
    spec:
      containers:
      - name: backend
        image: pintuotuo/backend:latest
        ports:
        - containerPort: 8080
          name: http
        env:
        - name: PORT
          value: "8080"
        - name: GIN_MODE
          value: "release"
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: pintuotuo-secrets
              key: database-url
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: pintuotuo-secrets
              key: jwt-secret
        - name: REDIS_URL
          value: "redis://redis:6379"
        - name: KAFKA_BROKERS
          value: "kafka:9092"
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: pintuotuo-backend-service
  labels:
    app: pintuotuo
    component: backend
spec:
  type: ClusterIP
  ports:
  - port: 8080
    targetPort: 8080
    protocol: TCP
    name: http
  selector:
    app: pintuotuo
    component: backend
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: pintuotuo-frontend
  labels:
    app: pintuotuo
    component: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: pintuotuo
      component: frontend
  template:
    metadata:
      labels:
        app: pintuotuo
        component: frontend
    spec:
      containers:
      - name: frontend
        image: pintuotuo/frontend:latest
        ports:
        - containerPort: 80
          name: http
        resources:
          requests:
            memory: "64Mi"
            cpu: "50m"
          limits:
            memory: "256Mi"
            cpu: "250m"
        livenessProbe:
          httpGet:
            path: /health
            port: 80
          initialDelaySeconds: 10
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 80
          initialDelaySeconds: 5
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: pintuotuo-frontend-service
  labels:
    app: pintuotuo
    component: frontend
spec:
  type: LoadBalancer
  ports:
  - port: 80
    targetPort: 80
    protocol: TCP
    name: http
  selector:
    app: pintuotuo
    component: frontend
