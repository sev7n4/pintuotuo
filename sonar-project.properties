sonar.projectKey=pintuotuo
sonar.projectName=Pintuotuo
sonar.projectVersion=0.1.0

sonar.host.url=https://sonarcloud.io
sonar.organization=your-org

# Sources
sonar.sources=backend,frontend
sonar.inclusions=backend/**/*.go,frontend/src/**/*.{ts,tsx}
sonar.exclusions=backend/**/*_test.go,backend/**/migrations/**,frontend/node_modules/**,frontend/dist/**

# Go configuration
sonar.go.tests.reportPaths=backend/coverage.out
sonar.go.coverage.reportPaths=backend/coverage.out

# TypeScript/JavaScript configuration
sonar.typescript.lcov.reportPaths=frontend/coverage/lcov.info
sonar.javascript.lcov.reportPaths=frontend/coverage/lcov.info

# Code quality gates
sonar.qualitygate.wait=true
sonar.qualitygate.timeout=300

# Exclude certain files from analysis
sonar.exclusions=**/*_test.go,**/node_modules/**,**/dist/**,**/*.min.js,**/coverage/**

# Coverage thresholds
sonar.coverage.exclusions=**/*_test.go,**/test/**,**/tests/**,**/mocks/**
sonar.test.inclusions=**/*_test.go,frontend/src/**/*.{test,spec}.{ts,tsx}

# Issue handling
sonar.cpd.exclusions=**/*_test.go,frontend/**/*.test.{ts,tsx}
sonar.issue.ignore.multicriteria=e1,e2
sonar.issue.ignore.multicriteria.e1.ruleKey=go:S1027
sonar.issue.ignore.multicriteria.e1.resourceKey=**
sonar.issue.ignore.multicriteria.e2.ruleKey=go:S1023
sonar.issue.ignore.multicriteria.e2.resourceKey=**
