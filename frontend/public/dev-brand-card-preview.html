<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>厂商徽标预览（与首页无主图卡片一致）</title>
    <style>
      * {
        box-sizing: border-box;
      }
      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial,
          sans-serif;
        margin: 0;
        padding: 24px;
        background: #fafafa;
        color: rgba(0, 0, 0, 0.85);
      }
      h1 {
        font-size: 16px;
        font-weight: 600;
        margin: 0 0 8px;
      }
      p {
        margin: 0 0 20px;
        font-size: 13px;
        color: rgba(0, 0, 0, 0.55);
      }
      .row {
        display: flex;
        flex-wrap: wrap;
        gap: 20px;
        align-items: flex-start;
      }
      .col {
        flex: 0 0 auto;
        width: 200px;
      }
      .label {
        font-size: 12px;
        color: rgba(0, 0, 0, 0.45);
        margin-bottom: 8px;
      }
      .productImage {
        position: relative;
        width: 100%;
        height: 160px;
        background: #f5f5f5;
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: hidden;
        border-radius: 8px;
        border: 1px solid #f0f0f0;
      }
      .productBrandBadge {
        display: flex;
        align-items: center;
        justify-content: center;
        width: 88px;
        height: 88px;
        border-radius: 22px;
        background: linear-gradient(
          180deg,
          rgba(255, 255, 255, 0.98) 0%,
          rgba(255, 255, 255, 0.88) 100%
        );
        border: 1px solid rgba(0, 0, 0, 0.06);
        box-shadow:
          0 1px 2px rgba(0, 0, 0, 0.04),
          0 10px 28px rgba(0, 0, 0, 0.08);
        backdrop-filter: blur(10px);
      }
      .productBrandLogo {
        width: 48px;
        height: 48px;
        object-fit: contain;
        opacity: 0.88;
      }
      .surface-openai {
        background: radial-gradient(
            120% 80% at 18% 12%,
            rgba(16, 163, 127, 0.09) 0%,
            transparent 55%
          ),
          linear-gradient(165deg, #fafafa 0%, #f0f0f0 100%);
      }
      .surface-anthropic {
        background: radial-gradient(
            120% 80% at 18% 12%,
            rgba(217, 119, 87, 0.08) 0%,
            transparent 55%
          ),
          linear-gradient(165deg, #fafafa 0%, #f0f0f0 100%);
      }
      .surface-deepseek {
        background: radial-gradient(
            120% 80% at 18% 12%,
            rgba(77, 107, 254, 0.08) 0%,
            transparent 55%
          ),
          linear-gradient(165deg, #fafafa 0%, #f0f0f0 100%);
      }

      .surface-zhipu {
        background: radial-gradient(
            120% 80% at 18% 12%,
            rgba(22, 119, 255, 0.07) 0%,
            transparent 55%
          ),
          linear-gradient(165deg, #fafafa 0%, #f0f0f0 100%);
      }
    </style>
  </head>
  <body>
    <h1>首页卡片 · 无主图时的厂商徽标（当前样式）</h1>
    <p>
      启动前端后访问本页即可本地预览，无需登录后端。图标与线上同源（MIT）：
      <code>unpkg.com/@lobehub/icons-static-svg@1.90.0/icons/*.svg</code>。看完整首页请另起后端并打开 <code>/</code>。
    </p>
    <div class="row">
      <div class="col">
        <div class="label">OpenAI</div>
        <div class="productImage surface-openai">
          <div class="productBrandBadge" aria-hidden="true">
            <img
              class="productBrandLogo"
              src="https://unpkg.com/@lobehub/icons-static-svg@1.90.0/icons/openai.svg"
              alt=""
            />
          </div>
        </div>
      </div>
      <div class="col">
        <div class="label">Anthropic</div>
        <div class="productImage surface-anthropic">
          <div class="productBrandBadge" aria-hidden="true">
            <img
              class="productBrandLogo"
              src="https://unpkg.com/@lobehub/icons-static-svg@1.90.0/icons/anthropic.svg"
              alt=""
            />
          </div>
        </div>
      </div>
      <div class="col">
        <div class="label">智谱 zhipu（Lobe Icons）</div>
        <div class="productImage surface-zhipu">
          <div class="productBrandBadge" aria-hidden="true">
            <img
              class="productBrandLogo"
              src="https://unpkg.com/@lobehub/icons-static-svg@1.90.0/icons/zhipu.svg"
              alt=""
            />
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
