apiVersion: v1
kind: Namespace
metadata:
  name: pintuotuo
---
apiVersion: v1
kind: Secret
metadata:
  name: pintuotuo-secrets
  namespace: pintuotuo
type: Opaque
stringData:
  database-url: "postgresql://pintuotuo:$(DB_PASSWORD)@postgres:5432/pintuotuo_db?sslmode=disable"
  redis-url: "redis://redis:6379"
  jwt-secret: "$(JWT_SECRET)"
  encryption-key: "$(ENCRYPTION_KEY)"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: pintuotuo-config
  namespace: pintuotuo
data:
  PORT: "8080"
  DB_MAX_OPEN_CONNS: "50"
  DB_MAX_IDLE_CONNS: "10"
  DB_CONN_MAX_LIFETIME: "30m"
  DB_CONN_MAX_IDLE_TIME: "10m"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: pintuotuo
  labels:
    app: pintuotuo
    component: backend
spec:
  replicas: 3
  selector:
    matchLabels:
      app: pintuotuo
      component: backend
  template:
    metadata:
      labels:
        app: pintuotuo
        component: backend
    spec:
      containers:
        - name: backend
          image: pintuotuo/backend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: pintuotuo-config
            - secretRef:
                name: pintuotuo-secrets
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /api/v1/health/live
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /api/v1/health/ready
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: pintuotuo
spec:
  selector:
    app: pintuotuo
    component: backend
  ports:
    - port: 8080
      targetPort: 8080
  type: ClusterIP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: pintuotuo
  labels:
    app: pintuotuo
    component: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: pintuotuo
      component: frontend
  template:
    metadata:
      labels:
        app: pintuotuo
        component: frontend
    spec:
      containers:
        - name: frontend
          image: pintuotuo/frontend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 80
          resources:
            requests:
              memory: "64Mi"
              cpu: "100m"
            limits:
              memory: "128Mi"
              cpu: "200m"
          livenessProbe:
            httpGet:
              path: /health
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 80
            initialDelaySeconds: 3
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: pintuotuo
spec:
  selector:
    app: pintuotuo
    component: frontend
  ports:
    - port: 80
      targetPort: 80
  type: ClusterIP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: pintuotuo-ingress
  namespace: pintuotuo
  annotations:
    kubernetes.io/ingress.class: nginx
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  tls:
    - hosts:
        - api.pintuotuo.com
        - www.pintuotuo.com
      secretName: pintuotuo-tls
  rules:
    - host: api.pintuotuo.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: backend
                port:
                  number: 8080
    - host: www.pintuotuo.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 80
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: backend-hpa
  namespace: pintuotuo
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: backend
  minReplicas: 3
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
