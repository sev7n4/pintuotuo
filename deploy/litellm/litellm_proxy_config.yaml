# LiteLLM Proxy — 纯BYOK模式配置
# 所有配置从 merchant_api_keys + merchant_skus 动态获取
# 文档：https://docs.litellm.ai/docs/proxy/clientside_auth

model_list: []

general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY

router_settings:
  routing_strategy: simple-shuffle
  num_retries: 2
  timeout: 120

litellm_settings:
  drop_params: true
  callbacks:
    - prometheus
