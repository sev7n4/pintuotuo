# LiteLLM Proxy — 通配 BYOK（默认）
#
# 上游 Key 由业务后端在 route_mode=litellm 时通过请求体 user_config（及 litellm_params 内 api_key/api_base）注入；
# 与 api_proxy.buildLitellmUserConfig、api_key_validator.probeQuotaViaLitellmUserConfig 对齐。
# 上新模型一般无需改本文件（门禁在后端目录与权益）；可选 make litellm-catalog-assemble 生成显式列表。
#
# 文档：https://docs.litellm.ai/docs/proxy/clientside_auth
#

model_list:
  - model_name: "*"
    litellm_params:
      model: "*"
      configurable_clientside_auth_params: ["api_key", "api_base"]

  - model_name: "openai/*"
    litellm_params:
      model: "openai/*"
      configurable_clientside_auth_params: ["api_key", "api_base"]

  - model_name: "anthropic/*"
    litellm_params:
      model: "anthropic/*"
      configurable_clientside_auth_params: ["api_key", "api_base"]

  - model_name: "zai/*"
    litellm_params:
      model: "zai/*"
      configurable_clientside_auth_params: ["api_key", "api_base"]

  - model_name: "moonshot/*"
    litellm_params:
      model: "moonshot/*"
      configurable_clientside_auth_params: ["api_key", "api_base"]

  - model_name: "minimax/*"
    litellm_params:
      model: "minimax/*"
      configurable_clientside_auth_params: ["api_key", "api_base"]

  - model_name: "gemini/*"
    litellm_params:
      model: "gemini/*"
      configurable_clientside_auth_params: ["api_key", "api_base"]

  - model_name: "deepseek/*"
    litellm_params:
      model: "deepseek/*"
      configurable_clientside_auth_params: ["api_key", "api_base"]

  - model_name: "dashscope/*"
    litellm_params:
      model: "dashscope/*"
      configurable_clientside_auth_params: ["api_key", "api_base"]

  - model_name: "openrouter/*"
    litellm_params:
      model: "openrouter/*"
      configurable_clientside_auth_params: ["api_key", "api_base"]

general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY

router_settings:
  routing_strategy: simple-shuffle
  num_retries: 2
  timeout: 120

litellm_settings:
  drop_params: true
  callbacks:
    - prometheus
