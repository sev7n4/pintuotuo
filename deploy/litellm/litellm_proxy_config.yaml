# LiteLLM Proxy — 与本项目 docker-compose.prod.yml 配套
# 上游 API Key 从根目录 .env 注入容器；勿将真实 Key 写入本文件。
#
# 本版 model id 已按各厂商官方文档（检索日期 2026-04-17）核对；后续请以各官方 /v1/models 为准迭代。
# 参考：
#   OpenAI: https://platform.openai.com/docs/models
#   Anthropic: https://docs.anthropic.com/en/docs/about-claude/models/all-models
#   Google Gemini: https://ai.google.dev/gemini-api/docs/models
#   DeepSeek: https://platform.deepseek.com/api-docs/
#   智谱: https://docs.bigmodel.cn/cn/guide/start/model-overview
#   阿里云百炼: https://help.aliyun.com/zh/model-studio/
#   Moonshot / Kimi: https://platform.moonshot.cn/docs （国内 Base 可设 MOONSHOT_API_BASE=https://api.moonshot.cn/v1）
#   MiniMax: https://docs.litellm.ai/docs/providers/minimax （国内常见 Base: https://api.minimax.chat/v1，可用 MINIMAX_API_BASE 覆盖）
#
# 文档：https://docs.litellm.ai/docs/proxy/configs

model_list:
  # ===========================================================================
  # P0 — OpenAI（旗舰链：文档推荐 gpt-5.4；gpt-5.1 为 coding/agentic 旗舰；Codex 为编程特化）
  # Snapshots 见各模型页「Snapshots」表；别名与快照并存时可二选一。
  # ===========================================================================
  - model_name: gpt-5.4
    litellm_params:
      model: openai/gpt-5.4
      api_key: os.environ/OPENAI_API_KEY
  - model_name: gpt-5.4-mini
    litellm_params:
      model: openai/gpt-5.4-mini
      api_key: os.environ/OPENAI_API_KEY
  - model_name: gpt-5.4-nano
    litellm_params:
      model: openai/gpt-5.4-nano
      api_key: os.environ/OPENAI_API_KEY
  - model_name: gpt-5.1
    litellm_params:
      model: openai/gpt-5.1
      api_key: os.environ/OPENAI_API_KEY
  - model_name: gpt-5.2
    litellm_params:
      model: openai/gpt-5.2
      api_key: os.environ/OPENAI_API_KEY
  - model_name: gpt-5
    litellm_params:
      model: openai/gpt-5
      api_key: os.environ/OPENAI_API_KEY
  - model_name: gpt-5-mini
    litellm_params:
      model: openai/gpt-5-mini
      api_key: os.environ/OPENAI_API_KEY
  - model_name: gpt-5-nano
    litellm_params:
      model: openai/gpt-5-nano
      api_key: os.environ/OPENAI_API_KEY
  - model_name: gpt-5-codex
    litellm_params:
      model: openai/gpt-5-codex
      api_key: os.environ/OPENAI_API_KEY
  - model_name: gpt-5.1-codex
    litellm_params:
      model: openai/gpt-5.1-codex
      api_key: os.environ/OPENAI_API_KEY
  - model_name: gpt-5.2-codex
    litellm_params:
      model: openai/gpt-5.2-codex
      api_key: os.environ/OPENAI_API_KEY
  - model_name: gpt-5.3-codex
    litellm_params:
      model: openai/gpt-5.3-codex
      api_key: os.environ/OPENAI_API_KEY

  # ===========================================================================
  # P0 — Anthropic（当前 GA：Opus 4.7 / Sonnet 4.6 / Haiku 4.5；已弃用 claude-3-5-* 主路径）
  # Claude API ID 见 all-models 表；别名可用不带日期的 haiku。
  # ===========================================================================
  - model_name: claude-opus-4-7
    litellm_params:
      model: anthropic/claude-opus-4-7
      api_key: os.environ/ANTHROPIC_API_KEY
  - model_name: claude-sonnet-4-6
    litellm_params:
      model: anthropic/claude-sonnet-4-6
      api_key: os.environ/ANTHROPIC_API_KEY
  - model_name: claude-haiku-4-5
    litellm_params:
      model: anthropic/claude-haiku-4-5
      api_key: os.environ/ANTHROPIC_API_KEY

  # ===========================================================================
  # P0 — Moonshot（Kimi：OpenAI 兼容；国内请在容器环境设 MOONSHOT_API_BASE=https://api.moonshot.cn/v1）
  # ===========================================================================
  # --- 经典 moonshot-v1（仅上下文长度不同）---
  - model_name: moonshot-v1-8k
    litellm_params:
      model: moonshot/moonshot-v1-8k
      api_key: os.environ/MOONSHOT_API_KEY
  - model_name: moonshot-v1-32k
    litellm_params:
      model: moonshot/moonshot-v1-32k
      api_key: os.environ/MOONSHOT_API_KEY
  - model_name: moonshot-v1-128k
    litellm_params:
      model: moonshot/moonshot-v1-128k
      api_key: os.environ/MOONSHOT_API_KEY
  # --- Kimi 显式命名（与控制台 / LiteLLM moonshot/ 前缀一致；名称以 platform.moonshot.cn 为准）---
  - model_name: kimi-k2.5
    litellm_params:
      model: moonshot/kimi-k2.5
      api_key: os.environ/MOONSHOT_API_KEY
  - model_name: kimi-k2.5-thinking
    litellm_params:
      model: moonshot/kimi-k2.5-thinking
      api_key: os.environ/MOONSHOT_API_KEY
  - model_name: kimi-latest
    litellm_params:
      model: moonshot/kimi-latest
      api_key: os.environ/MOONSHOT_API_KEY

  # ===========================================================================
  # P1 — MiniMax（OpenAI 兼容：https://api.minimax.io/v1；国内可改用 api_base: https://api.minimax.chat/v1）
  # ===========================================================================
  - model_name: minimax-m2.1
    litellm_params:
      model: minimax/MiniMax-M2.1
      api_key: os.environ/MINIMAX_API_KEY
      api_base: https://api.minimax.io/v1
  - model_name: minimax-m2.1-lightning
    litellm_params:
      model: minimax/MiniMax-M2.1-lightning
      api_key: os.environ/MINIMAX_API_KEY
      api_base: https://api.minimax.io/v1
  - model_name: minimax-m2
    litellm_params:
      model: minimax/MiniMax-M2
      api_key: os.environ/MINIMAX_API_KEY
      api_base: https://api.minimax.io/v1

  # ===========================================================================
  # P1 — Google Gemini（以 Google AI Studio 文档为准；以下为 2.5 代常用 id）
  # ===========================================================================
  - model_name: gemini-2.5-flash
    litellm_params:
      model: gemini/gemini-2.5-flash
      api_key: os.environ/GOOGLE_API_KEY
  - model_name: gemini-2.5-pro
    litellm_params:
      model: gemini/gemini-2.5-pro
      api_key: os.environ/GOOGLE_API_KEY

  # ===========================================================================
  # P1 — DeepSeek
  # ===========================================================================
  - model_name: deepseek-chat
    litellm_params:
      model: deepseek/deepseek-chat
      api_key: os.environ/DEEPSEEK_API_KEY
  - model_name: deepseek-reasoner
    litellm_params:
      model: deepseek/deepseek-reasoner
      api_key: os.environ/DEEPSEEK_API_KEY

  # ===========================================================================
  # P1 — 智谱 Z.A.I（官方 model 字段：glm-5、glm-5.1；LiteLLM 前缀 zai/）
  # ===========================================================================
  - model_name: glm-5
    litellm_params:
      model: zai/glm-5
      api_key: os.environ/ZAI_API_KEY
  - model_name: glm-5.1
    litellm_params:
      model: zai/glm-5.1
      api_key: os.environ/ZAI_API_KEY
  - model_name: glm-4.7
    litellm_params:
      model: zai/glm-4.7
      api_key: os.environ/ZAI_API_KEY

  # ===========================================================================
  # P1 — 阿里云通义千问 DashScope（model 名以百炼/Model Studio 文档为准）
  # ===========================================================================
  - model_name: qwen3-max
    litellm_params:
      model: dashscope/qwen3-max
      api_key: os.environ/DASHSCOPE_API_KEY
  - model_name: qwen-plus
    litellm_params:
      model: dashscope/qwen-plus
      api_key: os.environ/DASHSCOPE_API_KEY
  - model_name: qwen3-coder-plus
    litellm_params:
      model: dashscope/qwen3-coder-plus
      api_key: os.environ/DASHSCOPE_API_KEY

# 与后端 api_proxy 出站 HTTP Client 超时（默认 60s）对齐说明：见 backend/handlers/api_proxy.go 中 http.Client.Timeout。
# LiteLLM 对上游重试与冷却见官方 router_settings；业务层另有 smart_router 熔断与重试。
#
# 厂商侧容错（可选）：在 num_retries 用尽后按序尝试其他 model_name（须均已在 model_list 中定义）。
# 语法见: https://docs.litellm.ai/docs/proxy/reliability
# 示例（默认注释掉，由运维按成本与 SLA 启用）:
#   fallbacks:
#     - {"gpt-5-mini": ["gpt-5-nano"]}
#   context_window_fallbacks:
#     - {"glm-5.1": ["glm-5"]}
#   content_policy_fallbacks:
#     - {"kimi-k2.5": ["kimi-latest"]}
router_settings:
  routing_strategy: simple-shuffle
  num_retries: 2
  timeout: 120

litellm_settings:
  drop_params: true
