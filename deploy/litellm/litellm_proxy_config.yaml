# LiteLLM Proxy — 纯BYOK模式配置
# 所有配置从 merchant_api_keys + merchant_skus 动态获取
# 文档：https://docs.litellm.ai/docs/proxy/clientside_auth

model_list:
  # 动态 BYOK 模式（主服务使用）
  - model_name: openai/*
    litellm_params:
      model: openai/*
      configurable_clientside_auth_params: ["api_key", "api_base"]
  - model_name: anthropic/*
    litellm_params:
      model: anthropic/*
      configurable_clientside_auth_params: ["api_key", "api_base"]
  
  # 测试模型（用于健康检查和指标生成）
  - model_name: gpt-3.5-turbo
    litellm_params:
      model: openai/gpt-3.5-turbo
      api_key: os.environ/OPENAI_API_KEY

general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY

router_settings:
  routing_strategy: simple-shuffle
  num_retries: 2
  timeout: 120

litellm_settings:
  drop_params: true
  callbacks:
    - prometheus
