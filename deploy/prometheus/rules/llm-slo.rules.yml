groups:
  - name: llm_slo_alerts
    rules:
      - alert: BackendHighErrorRate
        expr: |
          (
            sum(rate(http_requests_total{job="pintuotuo-backend",status=~"5.."}[5m]))
            /
            clamp_min(sum(rate(http_requests_total{job="pintuotuo-backend"}[5m])), 1)
          ) > 0.05
        for: 10m
        labels:
          severity: critical
          service: backend
        annotations:
          summary: "Backend 5xx 错误率过高"
          description: "过去 10 分钟 backend 5xx 错误率超过 5%"

      - alert: BackendHighLatencyP95
        expr: |
          histogram_quantile(
            0.95,
            sum(rate(http_request_duration_seconds_bucket{job="pintuotuo-backend"}[5m])) by (le, endpoint)
          ) > 3
        for: 10m
        labels:
          severity: warning
          service: backend
        annotations:
          summary: "Backend P95 延迟过高"
          description: "endpoint={{ $labels.endpoint }} 的 P95 延迟超过 3 秒"

      - alert: BackendInstanceDown
        expr: up{job="pintuotuo-backend"} == 0
        for: 2m
        labels:
          severity: critical
          service: backend
        annotations:
          summary: "Backend 实例不可达"
          description: "Prometheus 无法抓取 backend:8080/metrics"

      - alert: LiteLLMGatewayDown
        expr: up{job="litellm"} == 0
        for: 3m
        labels:
          severity: critical
          service: litellm
        annotations:
          summary: "LiteLLM 聚合网关不可达"
          description: "Prometheus 无法抓取 litellm:4000/metrics（检查 --profile llm-gateway 与容器状态）"
