mixed-port: 7890
allow-lan: true
bind-address: "*"
mode: rule
log-level: info
ipv6: false
external-controller: 0.0.0.0:9091
external-ui: /etc/mihomo/ui

proxy-providers:
  xiguajiasu:
    type: http
    url: "http://43.248.192.4:60001/api/v1/client/subscribe?token=27508e6dba6ee86f6e9ef759d569e977"
    interval: 86400
    path: ./providers/xiguajiasu.yaml
    health-check:
      enable: true
      url: https://www.gstatic.com/generate_204
      interval: 300

proxy-groups:
  - name: overseas-api
    type: select
    use:
      - xiguajiasu
    proxies:
      - us-auto
      - auto-select
      - DIRECT
    filter: "(?:美国|日本|韩国)"

  - name: us-auto
    type: url-test
    use:
      - xiguajiasu
    url: https://www.gstatic.com/generate_204
    interval: 300
    tolerance: 100
    filter: "美国.*流媒体.*GPT"

  - name: auto-select
    type: url-test
    use:
      - xiguajiasu
    url: https://www.gstatic.com/generate_204
    interval: 300
    tolerance: 100

rules:
  - DOMAIN-SUFFIX,openai.com,overseas-api
  - DOMAIN-SUFFIX,anthropic.com,overseas-api
  - DOMAIN-SUFFIX,googleapis.com,overseas-api
  - DOMAIN-SUFFIX,openrouter.ai,overseas-api
  - DOMAIN-SUFFIX,github.com,overseas-api
  - DOMAIN-SUFFIX,githubusercontent.com,overseas-api
  - IP-CIDR,127.0.0.0/8,DIRECT
  - IP-CIDR,10.0.0.0/8,DIRECT
  - IP-CIDR,172.16.0.0/12,DIRECT
  - IP-CIDR,192.168.0.0/16,DIRECT
  - MATCH,DIRECT
